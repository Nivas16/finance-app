<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Personal Finance Manager</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-container">
            <div class="auth-header">
                <div class="logo-icon">💰</div>
                <h1>Finance Manager</h1>
                <p>Take control of your money</p>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            <form id="registerForm" class="auth-form hidden">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="regName" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="regEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="regPassword" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-rupee-sign"></i> Monthly Income</label>
                    <input type="number" id="regIncome" placeholder="50000" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            <div id="authError" class="auth-error hidden"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="main-app hidden">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">💰</div>
                <h2>FinManager</h2>
                <button class="sidebar-close" onclick="toggleSidebar()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-details">
                    <span class="user-name" id="userName">User</span>
                    <span class="user-email" id="userEmail">user@email.com</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="income">
                    <i class="fas fa-wallet"></i>
                    <span>Income</span>
                </a>
                <a href="#" class="nav-item" data-page="bank-emi">
                    <i class="fas fa-university"></i>
                    <span>Bank EMIs</span>
                </a>
                <a href="#" class="nav-item" data-page="personal-emi">
                    <i class="fas fa-handshake"></i>
                    <span>Personal EMIs</span>
                </a>
                <a href="#" class="nav-item" data-page="installments">
                    <i class="fas fa-building"></i>
                    <span>Society/Installments</span>
                </a>
                <a href="#" class="nav-item" data-page="bills">
                    <i class="fas fa-bolt"></i>
                    <span>Bills & Utilities</span>
                </a>
                <a href="#" class="nav-item" data-page="rent">
                    <i class="fas fa-home"></i>
                    <span>Room Rent</span>
                </a>
                <a href="#" class="nav-item" data-page="expenses">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Other Expenses</span>
                </a>
                <a href="#" class="nav-item" data-page="ai-advisor">
                    <i class="fas fa-robot"></i>
                    <span>AI Advisor</span>
                    <span class="badge-new">AI</span>
                </a>
                <a href="#" class="nav-item" data-page="loan-planner">
                    <i class="fas fa-calculator"></i>
                    <span>Loan Planner</span>
                </a>
                <a href="#" class="nav-item" data-page="savings-guide">
                    <i class="fas fa-piggy-bank"></i>
                    <span>Savings Guide</span>
                </a>
                <a href="#" class="nav-item" data-page="purchase-advisor">
                    <i class="fas fa-brain"></i>
                    <span>Purchase Advisor</span>
                    <span class="badge-new">AI</span>
                </a>
                <a href="#" class="nav-item" data-page="reports">
                    <i class="fas fa-chart-bar"></i>
                    <span>Reports</span>
                </a>
                <a href="#" class="nav-item" data-page="admin">
                    <i class="fas fa-cog"></i>
                    <span>Admin Panel</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title" id="pageTitle">Dashboard</h1>
                <div class="top-bar-actions">
                    <span class="sync-status" id="syncStatus">
                        <i class="fas fa-cloud-upload-alt"></i> Synced
                    </span>
                    <span class="current-date" id="currentDate"></span>
                </div>
            </header>

            <div class="content-area" id="contentArea">
                <!-- Dynamic content loads here -->
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <div class="toast-content">
            <i class="toast-icon fas fa-check-circle"></i>
            <span class="toast-message" id="toastMessage"></span>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content" id="modalContent">
            <!-- Dynamic modal content -->
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/emi.js"></script>
    <script src="js/expenses.js"></script>
    <script src="js/ai-advisor.js"></script>
    <script src="js/loan-planner.js"></script>
    <script src="js/savings-guide.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
